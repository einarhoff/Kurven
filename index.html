const DAGER = ["Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag", "Søndag"];

const KATEGORIER = [
  { id: "alle", label: "Alle" },
  { id: "norsk", label: "🇳🇴 Norsk" },
  { id: "pasta", label: "🍝 Pasta" },
  { id: "fisk", label: "🐟 Fisk" },
  { id: "wok", label: "🍜 Wok" },
  { id: "meksikansk", label: "🌮 Meksikansk" },
  { id: "italiensk", label: "🍕 Italiensk" },
  { id: "asiatisk", label: "🍛 Asiatisk" },
  { id: "vegetar", label: "🥦 Vegetar" },
];

function lagId() {
  return `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
}

function normaliserTekst(verdi) {
  return verdi.trim().toLowerCase();
}

function lesFraLagring() {
  if (typeof window === "undefined") {
    return null;
  }

  try {
    const rå = window.localStorage.getItem(STORAGE_KEY);
    if (!rå) {
      return null;
    }
    return JSON.parse(rå);
  } catch {
    return null;
  }
}

function hentStandardTema() {
  if (typeof window === "undefined") {
    return "lys";
  }

  return window.matchMedia?.("(prefers-color-scheme: dark)")?.matches ? "mørk" : "lys";
}

function byggHandleliste(ukeplan, manuelleVarer) {
  const map = new Map();

  Object.values(ukeplan).forEach((matrett) => {
    if (!matrett?.ingredienser) {
      return;
    }

    matrett.ingredienser.forEach((ingrediens) => {
      const nøkkel = normaliserTekst(ingrediens.navn);
      const eksisterende = map.get(nøkkel);

      if (eksisterende) {
        eksisterende.kilder.push(matrett.navn);
        eksisterende.mengder.push(ingrediens.mengde);
      } else {
        map.set(nøkkel, {
          id: `auto-${nøkkel}`,
          navn: ingrediens.navn,
          ferdig: false,
          type: "auto",
          kilder: [matrett.navn],
          mengder: [ingrediens.mengde],
        });
      }
    });
  });

  const autoVarer = Array.from(map.values()).map((vare) => ({
    ...vare,
    kildeLabel:
      vare.kilder.length === 1
        ? vare.kilder[0]
        : `${vare.kilder.length} retter`,
    mengdeLabel: Array.from(new Set(vare.mengder)).join(" + "),
  }));

  return [
    ...manuelleVarer.map((vare) => ({
      ...vare,
      type: "manuell",
      kildeLabel: "Lagt til manuelt",
      mengdeLabel: vare.mengde || "",
    })),
    ...autoVarer,
  ];
}

function StatCard({ title, value, hint, farger }) {
  return (
    <div
      style={{
        flex: 1,
        background: farger.panel,
        borderRadius: 18,
        padding: 14,
        boxShadow: farger.skygge,
      }}
    >
      <div
        style={{
          fontFamily: "sans-serif",
          fontSize: 12,
          color: farger.tekstSekundær,
          marginBottom: 6,
        }}
      >
        {title}
      </div>
      <div
        style={{
          fontFamily: "sans-serif",
          fontSize: 22,
          fontWeight: 700,
          color: farger.tekst,
        }}
      >
        {value}
      </div>
      <div
        style={{
          fontFamily: "sans-serif",
          fontSize: 12,
          color: farger.tekstSvak,
          marginTop: 4,
        }}
      >
        {hint}
      </div>
    </div>
  );
}

  const [valgtDag, setValgtDag] = useState(null);

  const [søk, setSøk] = useState("");

  const [tema, setTema] = useState(lagret?.tema || hentStandardTema());
  const [visInnstillinger, setVisInnstillinger] = useState(false);

    const timeout = toast
      ? setTimeout(() => {
          setToast(null);

      : null;

    return () => {
      if (timeout) {
        clearTimeout(timeout);
      }
    };
  }, [toast]);

  useEffect(() => {
    if (typeof window === "undefined") {
      return;
    }

    window.localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify({
        manuelleVarer,
        ferdigeVarer,
        ukeplan,
        tema,
      })
    );
  }, [manuelleVarer, ferdigeVarer, ukeplan, tema]);

  const handleliste = useMemo(() => {
    const råListe = byggHandleliste(ukeplan, manuelleVarer);
    return råListe.map((vare) => ({
      ...vare,
      ferdig: Boolean(ferdigeVarer[vare.id]),
    }));
  }, [ukeplan, manuelleVarer, ferdigeVarer]);

  useEffect(() => {
    setFerdigeVarer((prev) => {
      const gyldigeIder = new Set(handleliste.map((vare) => vare.id));
      const neste = Object.fromEntries(
        Object.entries(prev).filter(([id]) => gyldigeIder.has(id))
      );
      const erLik = JSON.stringify(prev) === JSON.stringify(neste);
      return erLik ? prev : neste;
    });
  }, [handleliste]);

  const byttTema = () => {
    setTema((prev) => (prev === "lys" ? "mørk" : "lys"));
  };

  const visToast = (melding, type = "success") => {
    setToast({ melding, type });
  };

  const leggTilVare = () => {
    const navn = nyVare.trim();
    if (!navn) {
      return;
    }

    setManuelleVarer((prev) => [
      ...prev,
      {
        id: lagId(),
        navn,
      },
    ]);
    setNyVare("");
    visToast("Vare lagt til");
  };

  const toggleVare = (id) => {
    setFerdigeVarer((prev) => ({
      ...prev,
      [id]: !prev[id],
    }));
  };

  const fjernFerdige = () => {
    const ferdigeManuelleIder = new Set(
      handleliste
        .filter((vare) => vare.type === "manuell" && vare.ferdig)
        .map((vare) => vare.id)
    );

    setManuelleVarer((prev) => prev.filter((vare) => !ferdigeManuelleIder.has(vare.id)));

    setFerdigeVarer((prev) => {
      const neste = { ...prev };
      Object.keys(neste).forEach((id) => {
        if (neste[id]) {
          delete neste[id];
        }
      });
      return neste;
    });

    visToast("Ferdige varer fjernet");
  };

  const tømHandleliste = () => {
    setManuelleVarer([]);
    setFerdigeVarer({});
    visToast("Kurven er tømt");
  };

  const leggTilMatrett = (dag, matrett) => {
    setUkeplan((prev) => ({
      ...prev,
      [dag]: matrett,
    }));
    setVisMatretter(false);
    setValgtDag(null);
    visToast(`${matrett.navn} lagt til ${dag}`);
  };

  const fjernFraDag = (dag) => {
    const eksisterende = ukeplan[dag];
    setUkeplan((prev) => {
      const neste = { ...prev };
      delete neste[dag];
      return neste;
    });
    if (eksisterende) {
      visToast(`${eksisterende.navn} fjernet fra ${dag}`);
    }
  };

  const nullstillUkeplan = () => {
    setUkeplan({});
    setFerdigeVarer((prev) => {
      const neste = { ...prev };
      Object.keys(neste).forEach((id) => {
        if (id.startsWith("auto-")) {
          delete neste[id];
        }
      });
      return neste;
    });

    const kategoriMatch = valgtKategori === "alle" || m.kategori === valgtKategori;
    const søkMatch = m.navn.toLowerCase().includes(søk.toLowerCase());

                          >
                            Ingen middag valgt
                          </p>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        {matrett && (
                          <button
                            onClick={() => fjernFraDag(dag)}
                            style={{
                              width: 34,
                              height: 34,
                              borderRadius: 10,
                              border: "none",
                              background: farger.aksentSvak,
                              color: farger.aksent,
                              cursor: "pointer",
                              fontSize: 16,
                            }}
                          >
                            ✕
                          </button>
                        )}
                        <button
                          onClick={() => {
                            setValgtDag(dag);
                            setVisMatretter(true);
                          }}
                          style={{
                            padding: "8px 14px",
                            borderRadius: 10,
                            border: "none",
                            background: farger.aksentGradient,
                            color: "white",
                            fontFamily: "sans-serif",
                            fontSize: 13,
                            fontWeight: 700,
                            cursor: "pointer",
                          }}
                        >
                          {matrett ? "Bytt" : "Velg"}
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {aktivFane === "oppskrifter" && (
          <div style={{ padding: "0 16px" }}>
            <input
              value={søk}
              onChange={(e) => setSøk(e.target.value)}
              placeholder="Søk etter rett..."
              style={{
                width: "100%",
                padding: "12px 16px",
                borderRadius: 14,
                border: `2px solid ${farger.inputkant}`,
                fontSize: 15,
                fontFamily: "sans-serif",
                background: farger.panelSterk,
                outline: "none",
                color: farger.tekst,
                boxSizing: "border-box",
                marginBottom: 12,
              }}
            />

            <div
              style={{
                display: "flex",
                gap: 6,
                overflowX: "auto",
                paddingBottom: 8,
                marginBottom: 12,
              }}
            >
              {KATEGORIER.map((kat) => (
                <button
                  key={kat.id}
                  onClick={() => setValgtKategori(kat.id)}
                  style={{
                    padding: "6px 14px",
                    borderRadius: 20,
                    border: "none",
                    background: valgtKategori === kat.id ? farger.aksentGradient : farger.panel,
                    color: valgtKategori === kat.id ? "white" : farger.tekstSekundær,
                    fontFamily: "sans-serif",
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                    whiteSpace: "nowrap",
                  }}
                >
                  {kat.label}
                </button>
              ))}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filtrertMatretter.map((matrett) => {
                const alleredePlanlagt = Object.values(ukeplan).some((planlagt) => planlagt?.id === matrett.id);
                return (
                  <div
                    key={matrett.id}
                    style={{
                      background: farger.panel,
                      borderRadius: 16,
                      padding: 16,
                      boxShadow: farger.skygge,
                    }}
                  >
                    <div
                      style={{
                        display: "flex",
                        alignItems: "flex-start",
                        justifyContent: "space-between",
                        gap: 10,
                        marginBottom: 10,
                      }}
                    >
                      <div>
                        <span style={{ fontSize: 28 }}>{matrett.emoji}</span>
                        <p
                          style={{
                            margin: "4px 0 2px",
                            fontFamily: "sans-serif",
                            fontSize: 17,
                            fontWeight: 700,
                            color: farger.tekst,
                          }}
                        >
                          {matrett.navn}
                        </p>
                        <p
                          style={{
                            margin: 0,
                            fontFamily: "sans-serif",
                            fontSize: 13,
                            color: farger.tekstSekundær,
                          }}
                        >
                          ⏱ {matrett.tid}
                        </p>
                      </div>
                      <button
                        onClick={() => {
                          const ledigDag = DAGER.find((d) => !ukeplan[d]);
                          if (ledigDag) {
                            leggTilMatrett(ledigDag, matrett);
                          } else {
                            visToast("Alle dager er fulle. Bytt rett i ukeplan.", "info");
                          }
                        }}
                        style={{
                          padding: "8px 14px",
                          borderRadius: 10,
                          border: "none",
                          background: alleredePlanlagt ? farger.aksentSvak : farger.aksentGradient,
                          color: alleredePlanlagt ? farger.tekstSekundær : "white",
                          fontFamily: "sans-serif",
                          fontSize: 13,
                          fontWeight: 700,
                          cursor: "pointer",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {alleredePlanlagt ? "Planlagt" : "+ Legg til"}
                      </button>
                    </div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {matrett.ingredienser.map((ing, i) => (
                        <span
                          key={`${matrett.id}-${i}`}
                          style={{
                            padding: "3px 10px",
                            borderRadius: 20,
                            background: farger.aksentSvak,
                            color: farger.aksent,
                            fontFamily: "sans-serif",
                            fontSize: 12,
                          }}
                        >
                          {ing.navn}
                        </span>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {visMatretter && (
        <div
          style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,0.5)",
            zIndex: 100,
            display: "flex",
            alignItems: "flex-end",
          }}
          onClick={() => setVisMatretter(false)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{
              width: "100%",
              maxHeight: "80vh",
              background: farger.modalBakgrunn,
              borderRadius: "24px 24px 0 0",
              padding: "24px 16px",
              overflowY: "auto",
            }}
          >
            <div
              style={{
                width: 40,
                height: 4,
                background: farger.checkbox,
                borderRadius: 2,
                margin: "0 auto 20px",
              }}
            />
            <h3
              style={{
                margin: "0 0 16px",
                fontFamily: "sans-serif",
                fontSize: 18,
                color: farger.tekst,
              }}
            >
              Velg middag til {valgtDag}
            </h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {MATRETTER.map((matrett) => (
                <div
                  key={matrett.id}
                  onClick={() => leggTilMatrett(valgtDag, matrett)}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 14,
                    padding: "14px 16px",
                    background: farger.panelSterk,
                    borderRadius: 14,
                    cursor: "pointer",
                    boxShadow: farger.skygge,
                  }}
                >
                  <span style={{ fontSize: 28 }}>{matrett.emoji}</span>
                  <div style={{ flex: 1 }}>
                    <p
                      style={{
                        margin: 0,
                        fontFamily: "sans-serif",
                        fontWeight: 700,
                        color: farger.tekst,
                      }}
                    >
                      {matrett.navn}
                    </p>
                    <p
                      style={{
                        margin: "2px 0 0",
                        fontFamily: "sans-serif",
                        fontSize: 12,
                        color: farger.tekstSekundær,
                      }}
                    >
                      {matrett.ingredienser.length} ingredienser · ⏱ {matrett.tid}
                    </p>
                  </div>
                  <span style={{ color: farger.aksent, fontSize: 20 }}>→</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {visInnstillinger && (
        <div
          style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,0.5)",
            zIndex: 120,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: 16,
          }}
          onClick={() => setVisInnstillinger(false)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{
              width: "100%",
              maxWidth: 380,
              background: farger.panelSterk,
              borderRadius: 22,
              padding: 18,
              boxShadow: farger.skygge,
              border: `1px solid ${farger.kant}`,
            }}
          >
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                marginBottom: 14,
              }}
            >
              <h3
                style={{
                  margin: 0,
                  fontFamily: "sans-serif",
                  fontSize: 18,
                  color: farger.tekst,
                }}
              >
                Innstillinger
              </h3>
              <button
                onClick={() => setVisInnstillinger(false)}
                style={{
                  width: 34,
                  height: 34,
                  borderRadius: 10,
                  border: "none",
                  background: farger.aksentSvak,
                  color: farger.aksent,
                  cursor: "pointer",
                  fontSize: 16,
                }}
              >
                ✕
              </button>
            </div>

            <div
              style={{
                background: farger.panel,
                borderRadius: 16,
                padding: 14,
                border: `1px solid ${farger.kant}`,
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  gap: 12,
                }}
              >
                <div>
                  <div
                    style={{
                      fontFamily: "sans-serif",
                      fontSize: 15,
                      fontWeight: 700,
                      color: farger.tekst,
                    }}
                  >
                    Mørk modus
                  </div>
                  <div
                    style={{
                      fontFamily: "sans-serif",
                      fontSize: 13,
                      color: farger.tekstSekundær,
                      marginTop: 4,
                    }}
                  >
                    Bytt mellom lyst og mørkt tema
                  </div>
                </div>

                <button
                  onClick={byttTema}
                  style={{
                    width: 74,
                    height: 40,
                    borderRadius: 999,
                    border: "none",
                    background: tema === "mørk" ? farger.aksentGradient : farger.aksentSvak,
                    position: "relative",
                    cursor: "pointer",
                    padding: 4,
                  }}
                  aria-label="Bytt tema"
                >
                  <div
                    style={{
                      width: 32,
                      height: 32,
                      borderRadius: "50%",
                      background: farger.toggleKnott,
                      position: "absolute",
                      top: 4,
                      left: tema === "mørk" ? 38 : 4,
                      transition: "left 0.2s ease",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontSize: 15,
                    }}
                  >
                    {tema === "mørk" ? "🌙" : "☀️"}
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      <style>{`
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        input:focus { border-color: ${farger.inputkant} !important; box-shadow: 0 0 0 3px ${tema === "mørk" ? "rgba(255,138,76,0.14)" : "rgba(232,93,47,0.1)"} !important; }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
