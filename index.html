function lagId() {
  return `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
}

function normaliserTekst(verdi) {
  return verdi.trim().toLowerCase();
}

function lesFraLagring() {
  if (typeof window === "undefined") {
    return null;
  }

  try {
    const rå = window.localStorage.getItem(STORAGE_KEY);
    if (!rå) {
      return null;
    }
    return JSON.parse(rå);
  } catch {
    return null;
  }
}

function hentStandardTema() {
  if (typeof window === "undefined") {
    return "lys";
  }

  return window.matchMedia?.("(prefers-color-scheme: dark)")?.matches ? "mørk" : "lys";
}

function byggHandleliste(ukeplan, manuelleVarer) {
  const map = new Map();

  Object.values(ukeplan).forEach((matrett) => {
    if (!matrett?.ingredienser) {
      return;
    }

    matrett.ingredienser.forEach((ingrediens) => {
      const nøkkel = normaliserTekst(ingrediens.navn);
      const eksisterende = map.get(nøkkel);

      if (eksisterende) {
        eksisterende.kilder.push(matrett.navn);
        eksisterende.mengder.push(ingrediens.mengde);
      } else {
        map.set(nøkkel, {
          id: `auto-${nøkkel}`,
          navn: ingrediens.navn,
          ferdig: false,
          type: "auto",
          kilder: [matrett.navn],
          mengder: [ingrediens.mengde],
        });
      }
    });
  });

  const autoVarer = Array.from(map.values()).map((vare) => ({
    ...vare,
    kildeLabel:
      vare.kilder.length === 1
        ? vare.kilder[0]
        : `${vare.kilder.length} retter`,
    mengdeLabel: Array.from(new Set(vare.mengder)).join(" + "),
  }));

  return [
    ...manuelleVarer.map((vare) => ({
      ...vare,
      type: "manuell",
      kildeLabel: "Lagt til manuelt",
      mengdeLabel: vare.mengde || "",
    })),
    ...autoVarer,
  ];
}

function StatCard({ title, value, hint, farger }) {
  return (
    <div
      style={{
        flex: 1,
        background: farger.panel,
        borderRadius: 18,
        padding: 14,
        boxShadow: farger.skygge,
      }}
    >
      <div
        style={{
          fontFamily: "sans-serif",
          fontSize: 12,
          color: farger.tekstSekundær,
          marginBottom: 6,
        }}
      >
        {title}
      </div>
      <div
        style={{
          fontFamily: "sans-serif",
          fontSize: 22,
          fontWeight: 700,
          color: farger.tekst,
        }}
      >
        {value}
      </div>
      <div
        style={{
          fontFamily: "sans-serif",
          fontSize: 12,
          color: farger.tekstSvak,
          marginTop: 4,
        }}
      >
        {hint}
      </div>
    </div>
  );
}

  }, [toast]);

  useEffect(() => {
    if (typeof window === "undefined") {
      return;
    }

    window.localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify({
        manuelleVarer,
        ferdigeVarer,
        ukeplan,
        tema,
      })
    );
  }, [manuelleVarer, ferdigeVarer, ukeplan, tema]);

  const handleliste = useMemo(() => {
    const råListe = byggHandleliste(ukeplan, manuelleVarer);
    return råListe.map((vare) => ({
      ...vare,
      ferdig: Boolean(ferdigeVarer[vare.id]),
    }));
  }, [ukeplan, manuelleVarer, ferdigeVarer]);

  useEffect(() => {
    setFerdigeVarer((prev) => {
      const gyldigeIder = new Set(handleliste.map((vare) => vare.id));
      const neste = Object.fromEntries(
        Object.entries(prev).filter(([id]) => gyldigeIder.has(id))
      );
      const erLik = JSON.stringify(prev) === JSON.stringify(neste);
      return erLik ? prev : neste;
    });
  }, [handleliste]);

  const byttTema = () => {
    setTema((prev) => (prev === "lys" ? "mørk" : "lys"));
  };

  const visToast = (melding, type = "success") => {
    setToast({ melding, type });
  };

  const leggTilVare = () => {
    const navn = nyVare.trim();
    if (!navn) {
      return;
    }

    setManuelleVarer((prev) => [
      ...prev,
      {
        id: lagId(),
        navn,
      },
    ]);
    setNyVare("");
    visToast("Vare lagt til");
  };

  const toggleVare = (id) => {
    setFerdigeVarer((prev) => ({
      ...prev,
      [id]: !prev[id],
    }));
  };

  const fjernFerdige = () => {
    const ferdigeManuelleIder = new Set(
      handleliste
        .filter((vare) => vare.type === "manuell" && vare.ferdig)
        .map((vare) => vare.id)
    );

    setManuelleVarer((prev) => prev.filter((vare) => !ferdigeManuelleIder.has(vare.id)));

    setFerdigeVarer((prev) => {
      const neste = { ...prev };
      Object.keys(neste).forEach((id) => {
        if (neste[id]) {
          delete neste[id];
        }
      });
      return neste;
    });

    visToast("Ferdige varer fjernet");
  };

  const tømHandleliste = () => {
    setManuelleVarer([]);
    setFerdigeVarer({});
    visToast("Kurven er tømt");
  };

  const leggTilMatrett = (dag, matrett) => {
    setUkeplan((prev) => ({
      ...prev,
      [dag]: matrett,
    }));
    setVisMatretter(false);
    setValgtDag(null);
    visToast(`${matrett.navn} lagt til ${dag}`);
  };

  const fjernFraDag = (dag) => {
    const eksisterende = ukeplan[dag];
    setUkeplan((prev) => {
      const neste = { ...prev };
      delete neste[dag];
      return neste;
    });
    if (eksisterende) {
      visToast(`${eksisterende.navn} fjernet fra ${dag}`);
    }
  };

  const nullstillUkeplan = () => {
    setUkeplan({});
    setFerdigeVarer((prev) => {
      const neste = { ...prev };
      Object.keys(neste).forEach((id) => {
        if (id.startsWith("auto-")) {
          delete neste[id];
        }
      });
      return neste;
    });
    visToast("Ukeplan nullstilt");
  };

  const filtrertMatretter = MATRETTER.filter((m) => {
    const kategoriMatch = valgtKategori === "alle" || m.kategori === valgtKategori;
    const søkMatch = m.navn.toLowerCase().includes(søk.toLowerCase());
    return kategoriMatch && søkMatch;
  });

  const filtrertHandleliste = visKunMangler
    ? handleliste.filter((vare) => !vare.ferdig)
    : handleliste;

  const antallFerdig = handleliste.filter((v) => v.ferdig).length;
  const antallTotalt = handleliste.length;
  const antallPlanlagte = Object.keys(ukeplan).length;
  const ledigeDager = DAGER.length - antallPlanlagte;

  return (
    <div
      style={{
        minHeight: "100vh",
        background: farger.bakgrunn,
        fontFamily: "'Georgia', serif",
        position: "relative",
        overflow: "hidden",
      }}
    >
      <div
        style={{
          position: "fixed",
          top: 0,
          left: 0,
          right: 0,
          bottom: 0,
          backgroundImage: farger.overlay,
          pointerEvents: "none",
          zIndex: 0,
        }}
      />

      {toast && (
        <div
          style={{
            position: "fixed",
            top: 20,
            left: "50%",
            transform: "translateX(-50%)",
            background: toast.type === "info" ? farger.toastInfo : farger.toastOk,
            color: "white",
            padding: "12px 24px",
            borderRadius: 50,
            fontFamily: "sans-serif",
            fontSize: 14,
            fontWeight: 600,
            zIndex: 9999,
            boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
          }}
        >
          {toast.melding}
        </div>
      )}

      <div
        style={{
          position: "relative",
          zIndex: 1,
          maxWidth: 520,
          margin: "0 auto",
          paddingBottom: 100,
        }}
      >
        <div
          style={{
            padding: "32px 20px 18px",
            textAlign: "center",
          }}
        >
          <img
            src={LOGO_DATA_URI}
            alt="Kurven logo"
            style={{ width: 88, height: 60, objectFit: "contain", marginBottom: 10 }}
          />
          <h1
            style={{
              fontSize: 30,
              fontWeight: 700,
              color: farger.tekst,
              margin: 0,
              letterSpacing: "-0.5px",
            }}
          >
            Kurven
          </h1>
        </div>

        <div
          style={{
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            gap: 10,
            padding: "0 16px",
            marginBottom: 16,
          }}
        >
          <div style={{ display: "flex", gap: 10, flex: 1 }}>
            <StatCard title="Planlagt" value={`${antallPlanlagte}/7`} hint={`${ledigeDager} ledige dager`} farger={farger} />
            <StatCard title="Handleliste" value={antallTotalt} hint={`${antallFerdig} ferdig`} farger={farger} />
          </div>

          <button
            onClick={() => setVisInnstillinger(true)}
            style={{
              width: 46,
              height: 46,
              borderRadius: 14,
              border: "none",
              background: farger.panelSterk,
              color: farger.tekst,
              boxShadow: farger.skygge,
              cursor: "pointer",
              fontSize: 20,
              flexShrink: 0,
            }}
            aria-label="Åpne innstillinger"
            title="Innstillinger"
          >
            ⚙️
          </button>
        </div>

        <div
          style={{
            display: "flex",
            margin: "0 16px 20px",
            background: farger.panelSvak,
            borderRadius: 16,
            padding: 4,
            boxShadow: farger.skygge,
            backdropFilter: "blur(10px)",
          }}
        >
          {[
            { id: "handleliste", label: "🛒 Handleliste" },
            { id: "ukeplan", label: "📅 Ukeplan" },
            { id: "oppskrifter", label: "🍽️ Retter" },
          ].map((fane) => (
            <button
              key={fane.id}
              onClick={() => setAktivFane(fane.id)}
              style={{
                flex: 1,
                padding: "10px 4px",
                border: "none",
                borderRadius: 12,
                cursor: "pointer",
                fontFamily: "sans-serif",
                fontSize: 13,
                fontWeight: 600,
                background: aktivFane === fane.id ? farger.aksentGradient : "transparent",
                color: aktivFane === fane.id ? "white" : farger.tekstSekundær,
                boxShadow: aktivFane === fane.id ? farger.skygge : "none",
              }}
            >
              {fane.label}
            </button>
          ))}
        </div>

        {aktivFane === "handleliste" && (
          <div style={{ padding: "0 16px" }}>
            {antallTotalt > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    fontFamily: "sans-serif",
                    fontSize: 13,
                    color: farger.tekstSekundær,
                    marginBottom: 6,
                  }}
                >
                  <span>
                    {antallFerdig} av {antallTotalt} varer hentet
                  </span>
                  <span>
                    {antallTotalt === 0 ? 0 : Math.round((antallFerdig / antallTotalt) * 100)}%
                  </span>
                </div>
                <div
                  style={{
                    height: 6,
                    background: farger.progressBakgrunn,
                    borderRadius: 3,
                    overflow: "hidden",
                  }}
                >
                  <div
                    style={{
                      height: "100%",
                      width: `${antallTotalt === 0 ? 0 : (antallFerdig / antallTotalt) * 100}%`,
                      background: farger.aksentGradient,
                      borderRadius: 3,
                      transition: "width 0.4s ease",
                    }}
                  />
                </div>
              </div>
            )}

            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <input
                value={nyVare}
                onChange={(e) => setNyVare(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && leggTilVare()}
                placeholder="Legg til vare..."
                style={{
                  flex: 1,
                  padding: "14px 16px",
                  borderRadius: 14,
                  border: `2px solid ${farger.inputkant}`,
                  fontSize: 16,
                  fontFamily: "sans-serif",
                  background: farger.panelSterk,
                  outline: "none",
                  color: farger.tekst,
                  boxShadow: farger.skygge,
                }}
              />
              <button
                onClick={leggTilVare}
                style={{
                  padding: "14px 18px",
                  borderRadius: 14,
                  border: "none",
                  background: farger.aksentGradient,
                  color: "white",
                  fontSize: 20,
                  cursor: "pointer",
                  boxShadow: farger.skygge,
                }}
              >
                +
              </button>
            </div>

            <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 14 }}>
              <button
                onClick={() => setVisKunMangler((prev) => !prev)}
                style={{
                  flex: 1,
                  padding: "10px 12px",
                  borderRadius: 12,
                  border: "none",
                  background: visKunMangler ? farger.knappMørk : farger.panel,
                  color: visKunMangler ? farger.knappMørkTekst : farger.tekstSekundær,
                  fontFamily: "sans-serif",
                  fontSize: 13,
                  fontWeight: 600,
                  cursor: "pointer",
                }}
              >
                {visKunMangler ? "Vis alle varer" : "Skjul ferdige"}
              </button>
              {Object.keys(ukeplan).length > 0 && (
                <button
                  onClick={nullstillUkeplan}
                  style={{
                    padding: "10px 12px",
                    borderRadius: 12,
                    border: "none",
                    background: farger.aksentSvak,
                    color: farger.aksent,
                    fontFamily: "sans-serif",
                    fontSize: 13,
                    fontWeight: 700,
                    cursor: "pointer",
                  }}
                >
                  Nullstill uke
                </button>
              )}
            </div>

            {filtrertHandleliste.length === 0 ? (
              <div
                style={{
                  textAlign: "center",
                  padding: "40px 20px",
                  color: farger.tekstSvak,
                  fontFamily: "sans-serif",
                  background: farger.tomBakgrunn,
                  borderRadius: 16,
                }}
              >
                <div style={{ fontSize: 48, marginBottom: 12 }}>🛒</div>
                <p style={{ margin: 0, fontSize: 16 }}>Kurven er tom</p>
                <p style={{ margin: "4px 0 0", fontSize: 13, opacity: 0.7 }}>
                  Legg til varer manuelt eller planlegg en middag
                </p>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {filtrertHandleliste.map((vare) => (
                  <div
                    key={vare.id}
                    onClick={() => toggleVare(vare.id)}
                    style={{
                      display: "flex",
                      alignItems: "flex-start",
                      gap: 12,
                      padding: "14px 16px",
                      background: vare.ferdig ? farger.panelSvak : farger.panelSterk,
                      borderRadius: 14,
                      cursor: "pointer",
                      boxShadow: farger.skygge,
                      border: `1px solid ${farger.kant}`,
                      opacity: vare.ferdig ? 0.65 : 1,
                    }}
                  >
                    <div
                      style={{
                        width: 24,
                        height: 24,
                        borderRadius: 8,
                        border: vare.ferdig ? "none" : `2px solid ${farger.checkbox}`,
                        background: vare.ferdig ? farger.aksentGradient : "transparent",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        flexShrink: 0,
                        marginTop: 2,
                      }}
                    >
                      {vare.ferdig && <span style={{ color: "white", fontSize: 14 }}>✓</span>}
                    </div>

                    <div style={{ flex: 1 }}>
                      <div
                        style={{
                          fontFamily: "sans-serif",
                          fontSize: 16,
                          color: farger.tekst,
                          textDecoration: vare.ferdig ? "line-through" : "none",
                          marginBottom: 4,
                        }}
                      >
                        {vare.navn}
                        {vare.mengdeLabel ? ` · ${vare.mengdeLabel}` : ""}
                      </div>
                      <div
                        style={{
                          fontFamily: "sans-serif",
                          fontSize: 12,
                          color: farger.tekstSekundær,
                        }}
                      >
                        {vare.kildeLabel}
                      </div>
                    </div>
                  </div>
                ))}

                {antallFerdig > 0 && (
                  <button
                    onClick={fjernFerdige}
                    style={{
                      width: "100%",
                      padding: "12px",
                      borderRadius: 14,
                      border: `2px dashed ${farger.inputkant}`,
                      background: "transparent",
                      color: farger.aksent,
                      fontFamily: "sans-serif",
                      fontSize: 14,
                      fontWeight: 700,
                      cursor: "pointer",
                      marginTop: 8,
                    }}
                  >
                    Fjern ferdige varer
                  </button>
                )}

                {antallTotalt > 0 && (
                  <button
                    onClick={tømHandleliste}
                    style={{
                      width: "100%",
                      padding: "12px",
                      borderRadius: 14,
                      border: "none",
                      background: farger.aksentSvak,
                      color: farger.aksent,
                      fontFamily: "sans-serif",
                      fontSize: 14,
                      fontWeight: 700,
                      cursor: "pointer",
                      marginTop: 8,
                    }}
                  >
                    Tøm handleliste
                  </button>
                )}
              </div>
            )}
          </div>
        )}

        {aktivFane === "ukeplan" && (
          <div style={{ padding: "0 16px" }}>
            <p
              style={{
                fontFamily: "sans-serif",
                fontSize: 14,
                color: farger.tekstSekundær,
                margin: "0 0 16px 2px",
              }}
            >
              Trykk på en dag for å velge middag.
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {DAGER.map((dag) => {
                const matrett = ukeplan[dag];
                return (
                  <div
                    key={dag}
                    style={{
                      background: farger.panel,
                      borderRadius: 16,
                      padding: "14px 16px",
                      boxShadow: farger.skygge,
                      border: matrett ? `2px solid ${farger.inputkant}` : "2px solid transparent",
                    }}
                  >
                    <div
                      style={{
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                        gap: 12,
                      }}
                    >
                      <div>
                        <p
                          style={{
                            margin: 0,
                            fontFamily: "sans-serif",
                            fontWeight: 700,
                            fontSize: 13,
                            color: farger.aksent,
                            textTransform: "uppercase",
                            letterSpacing: 0.5,
                          }}
                        >
                          {dag}
                        </p>
                        {matrett ? (
                          <>
                            <p
                              style={{
                                margin: "2px 0 0",
                                fontFamily: "sans-serif",
                                fontSize: 16,
                                color: farger.tekst,
                              }}
                            >
                              {matrett.emoji} {matrett.navn}
                            </p>
                            <p
                              style={{
                                margin: "4px 0 0",
                                fontFamily: "sans-serif",
                                fontSize: 12,
                                color: farger.tekstSekundær,
                              }}
                            >
                              {matrett.tid} · {matrett.ingredienser.length} ingredienser
                            </p>
                          </>
                        ) : (
                          <p
                            style={{
                              margin: "2px 0 0",
                              fontFamily: "sans-serif",
                              fontSize: 14,
                              color: farger.tekstSvak,
                            }}
                          >
                            Ingen middag valgt
                          </p>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        {matrett && (
                          <button
                            onClick={() => fjernFraDag(dag)}
                            style={{
                              width: 34,
                              height: 34,
                              borderRadius: 10,
                              border: "none",
                              background: farger.aksentSvak,
                              color: farger.aksent,
                              cursor: "pointer",
                              fontSize: 16,
                            }}
                          >
                            ✕
                          </button>
                        )}
                        <button
                          onClick={() => {
                            setValgtDag(dag);
                            setVisMatretter(true);
                          }}
                          style={{
                            padding: "8px 14px",
                            borderRadius: 10,
                            border: "none",
                            background: farger.aksentGradient,
                            color: "white",
                            fontFamily: "sans-serif",
                            fontSize: 13,
                            fontWeight: 700,
                            cursor: "pointer",
                          }}
                        >
                          {matrett ? "Bytt" : "Velg"}
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {aktivFane === "oppskrifter" && (
          <div style={{ padding: "0 16px" }}>
            <input
              value={søk}
              onChange={(e) => setSøk(e.target.value)}
              placeholder="Søk etter rett..."
              style={{
                width: "100%",
                padding: "12px 16px",
                borderRadius: 14,
                border: `2px solid ${farger.inputkant}`,
                fontSize: 15,
                fontFamily: "sans-serif",
                background: farger.panelSterk,
                outline: "none",
                color: farger.tekst,
                boxSizing: "border-box",
                marginBottom: 12,
              }}
            />

            <div
              style={{
                display: "flex",
                gap: 6,
                overflowX: "auto",
                paddingBottom: 8,
                marginBottom: 12,
              }}
            >
              {KATEGORIER.map((kat) => (
                <button
                  key={kat.id}
                  onClick={() => setValgtKategori(kat.id)}
                  style={{
                    padding: "6px 14px",
                    borderRadius: 20,
                    border: "none",
                    background: valgtKategori === kat.id ? farger.aksentGradient : farger.panel,
                    color: valgtKategori === kat.id ? "white" : farger.tekstSekundær,
                    fontFamily: "sans-serif",
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                    whiteSpace: "nowrap",
                  }}
                >
                  {kat.label}
                </button>
              ))}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filtrertMatretter.map((matrett) => {
                const alleredePlanlagt = Object.values(ukeplan).some((planlagt) => planlagt?.id === matrett.id);
                return (
                  <div
                    key={matrett.id}
                    style={{
                      background: farger.panel,
                      borderRadius: 16,
                      padding: 16,
                      boxShadow: farger.skygge,
                    }}
                  >
                    <div
                      style={{
                        display: "flex",
                        alignItems: "flex-start",
                        justifyContent: "space-between",
                        gap: 10,
                        marginBottom: 10,
                      }}
                    >
                      <div>
                        <span style={{ fontSize: 28 }}>{matrett.emoji}</span>
                        <p
                          style={{
                            margin: "4px 0 2px",
                            fontFamily: "sans-serif",
                            fontSize: 17,
                            fontWeight: 700,
                            color: farger.tekst,
                          }}
                        >
                          {matrett.navn}
                        </p>
                        <p
                          style={{
                            margin: 0,
                            fontFamily: "sans-serif",
                            fontSize: 13,
                            color: farger.tekstSekundær,
                          }}
                        >
                          ⏱ {matrett.tid}
                        </p>
                      </div>
                      <button
                        onClick={() => {
                          const ledigDag = DAGER.find((d) => !ukeplan[d]);
                          if (ledigDag) {
                            leggTilMatrett(ledigDag, matrett);
                          } else {
                            visToast("Alle dager er fulle. Bytt rett i ukeplan.", "info");
                          }
                        }}
                        style={{
                          padding: "8px 14px",
                          borderRadius: 10,
                          border: "none",
                          background: alleredePlanlagt ? farger.aksentSvak : farger.aksentGradient,
                          color: alleredePlanlagt ? farger.tekstSekundær : "white",
                          fontFamily: "sans-serif",
                          fontSize: 13,
                          fontWeight: 700,
                          cursor: "pointer",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {alleredePlanlagt ? "Planlagt" : "+ Legg til"}
                      </button>
                    </div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {matrett.ingredienser.map((ing, i) => (
                        <span
                          key={`${matrett.id}-${i}`}
                          style={{
                            padding: "3px 10px",
                            borderRadius: 20,
                            background: farger.aksentSvak,
                            color: farger.aksent,
                            fontFamily: "sans-serif",
                            fontSize: 12,
                          }}
                        >
                          {ing.navn}
                        </span>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {visMatretter && (
        <div
          style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,0.5)",
            zIndex: 100,
            display: "flex",
            alignItems: "flex-end",
          }}
          onClick={() => setVisMatretter(false)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{
              width: "100%",
              maxHeight: "80vh",
              background: farger.modalBakgrunn,
              borderRadius: "24px 24px 0 0",
              padding: "24px 16px",
              overflowY: "auto",
            }}
          >
            <div
              style={{
                width: 40,
                height: 4,
                background: farger.checkbox,
                borderRadius: 2,
                margin: "0 auto 20px",
              }}
            />
            <h3
              style={{
                margin: "0 0 16px",
                fontFamily: "sans-serif",
                fontSize: 18,
                color: farger.tekst,
              }}
            >
              Velg middag til {valgtDag}
            </h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {MATRETTER.map((matrett) => (
                <div
                  key={matrett.id}
                  onClick={() => leggTilMatrett(valgtDag, matrett)}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 14,
                    padding: "14px 16px",
                    background: farger.panelSterk,
                    borderRadius: 14,
                    cursor: "pointer",
                    boxShadow: farger.skygge,
                  }}
                >
                  <span style={{ fontSize: 28 }}>{matrett.emoji}</span>
                  <div style={{ flex: 1 }}>
                    <p
                      style={{
                        margin: 0,
                        fontFamily: "sans-serif",
                        fontWeight: 700,
                        color: farger.tekst,
                      }}
                    >
                      {matrett.navn}
                    </p>
                    <p
                      style={{
                        margin: "2px 0 0",
                        fontFamily: "sans-serif",
                        fontSize: 12,
                        color: farger.tekstSekundær,
                      }}
                    >
                      {matrett.ingredienser.length} ingredienser · ⏱ {matrett.tid}
                    </p>
                  </div>
                  <span style={{ color: farger.aksent, fontSize: 20 }}>→</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {visInnstillinger && (
        <div
          style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,0.5)",
            zIndex: 120,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: 16,
          }}
          onClick={() => setVisInnstillinger(false)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{
              width: "100%",
              maxWidth: 380,
              background: farger.panelSterk,
              borderRadius: 22,
              padding: 18,
              boxShadow: farger.skygge,
              border: `1px solid ${farger.kant}`,
            }}
          >
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                marginBottom: 14,
              }}
            >
              <h3
                style={{
                  margin: 0,
                  fontFamily: "sans-serif",
                  fontSize: 18,
                  color: farger.tekst,
                }}
              >
                Innstillinger
              </h3>
              <button
                onClick={() => setVisInnstillinger(false)}
                style={{
                  width: 34,
                  height: 34,
                  borderRadius: 10,
                  border: "none",
                  background: farger.aksentSvak,
                  color: farger.aksent,
                  cursor: "pointer",
                  fontSize: 16,
                }}
              >
                ✕
              </button>
            </div>

            <div
              style={{
                background: farger.panel,
                borderRadius: 16,
                padding: 14,
                border: `1px solid ${farger.kant}`,
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  gap: 12,
                }}
              >
                <div>
                  <div
                    style={{
                      fontFamily: "sans-serif",
                      fontSize: 15,
                      fontWeight: 700,
                      color: farger.tekst,
                    }}
                  >
                    Mørk modus
                  </div>
                  <div
                    style={{
                      fontFamily: "sans-serif",
                      fontSize: 13,
                      color: farger.tekstSekundær,
                      marginTop: 4,
                    }}
                  >
                    Bytt mellom lyst og mørkt tema
                  </div>
                </div>

                <button
                  onClick={byttTema}
                  style={{
                    width: 74,
                    height: 40,
                    borderRadius: 999,
                    border: "none",
                    background: tema === "mørk" ? farger.aksentGradient : farger.aksentSvak,
                    position: "relative",
                    cursor: "pointer",
                    padding: 4,
                  }}
                  aria-label="Bytt tema"
                >
                  <div
                    style={{
                      width: 32,
                      height: 32,
                      borderRadius: "50%",
                      background: farger.toggleKnott,
                      position: "absolute",
                      top: 4,
                      left: tema === "mørk" ? 38 : 4,
                      transition: "left 0.2s ease",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontSize: 15,
                    }}
                  >
                    {tema === "mørk" ? "🌙" : "☀️"}
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      <style>{`
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        input:focus { border-color: ${farger.inputkant} !important; box-shadow: 0 0 0 3px ${tema === "mørk" ? "rgba(255,138,76,0.14)" : "rgba(232,93,47,0.1)"} !important; }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
