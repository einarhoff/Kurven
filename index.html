// ─── HOVED-APP ────────────────────────────────────────────────────────────────
function App() {
  const [bruker,setBruker]=useState(null);
  const [lastenBruker,setLastenBruker]=useState(true);
  const [tema,setTema]=useState("lys");
  const farger=TEMAER[tema]||TEMAER.lys;

  // Lister
  const [lister,setLister]=useState([]);
  const [aktivListe,setAktivListe]=useState(null);
  const [visListeVelger,setVisListeVelger]=useState(false);

  // Data for aktiv liste
  const [varer,setVarer]=useState([]);
  const [ukeplan,setUkeplan]=useState({});
  const [egneRetter,setEgneRetter]=useState([]);

  // UI
  const [aktivFane,setAktivFane]=useState("handleliste");
  const [nyVare,setNyVare]=useState("");
  const [toast,setToast]=useState(null);
  const [søk,setSøk]=useState("");
  const [valgtKategori,setValgtKategori]=useState("alle");
  const [retterFane,setRetterFane]=useState("foreslåtte");
  const [bekreftTøm,setBekreftTøm]=useState(false);
  const [velgRettForDag,setVelgRettForDag]=useState(null);
  const [velgDagForRett,setVelgDagForRett]=useState(null);
  const [visNyRett,setVisNyRett]=useState(false);

  const realtimeRef=useRef(null);

  const visToast=(m,t="success")=>{ setToast({melding:m,type:t}); setTimeout(()=>setToast(null),3000); };

  // ── Auth ──
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setBruker(session?.user||null);
      setLastenBruker(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setBruker(session?.user||null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // ── Last lister når bruker er logget inn ──
  useEffect(()=>{
    if(!bruker) return;
    lastLister();
  },[bruker]);

  const lastLister = async () => {
    // Hent alle lister brukeren er med i
    const {data,error}=await sb.from("lister").select("*").order("opprettet");
    if(error){ visToast("Feil ved lasting av lister","feil"); return; }
    setLister(data||[]);
    if(data&&data.length>0){
      const privat=data.find(l=>l.er_egen)||data[0];
      setAktivListe(privat);
    }
  };

  // ── Last data for aktiv liste ──
  useEffect(()=>{
    if(!aktivListe) return;
    lastListeData();
    settOppRealtime();
    return ()=>{ if(realtimeRef.current) sb.removeChannel(realtimeRef.current); };
  },[aktivListe]);

  const lastListeData = async () => {
    const id=aktivListe.id;
    const [{data:v},{data:u},{data:r}]=await Promise.all([
      sb.from("varer").select("*").eq("liste_id",id).order("opprettet"),
      sb.from("ukeplan").select("*").eq("liste_id",id),
      sb.from("egne_retter").select("*").eq("liste_id",id),
    ]);
    setVarer(v||[]);
    const up={};
    (u||[]).forEach(d=>{ try{up[d.dag]=JSON.parse(d.matrett);}catch{} });
    setUkeplan(up);
    setEgneRetter((r||[]).map(r=>({...JSON.parse(r.data),id:r.id})));
  };

  const settOppRealtime = () => {
    if(realtimeRef.current) sb.removeChannel(realtimeRef.current);
    const kanal=sb.channel(`liste-${aktivListe.id}`)
      .on("postgres_changes",{event:"*",schema:"public",table:"varer",filter:`liste_id=eq.${aktivListe.id}`},()=>lastListeData())
      .on("postgres_changes",{event:"*",schema:"public",table:"ukeplan",filter:`liste_id=eq.${aktivListe.id}`},()=>lastListeData())
      .subscribe();
    realtimeRef.current=kanal;
  };

  // ── Opprett ny liste ──
  const opprettListe = async (navn) => {
    const kode=lagKode();
    const {data,error}=await sb.from("lister").insert({navn,kode,eier_id:bruker.id,er_egen:false}).select().single();
    if(error){ visToast("Feil ved oppretting","feil"); return; }
    // Legg bruker til som medlem
    await sb.from("liste_medlemmer").insert({liste_id:data.id,bruker_id:bruker.id});
    await lastLister();
    setAktivListe(data);
    visToast(`"${navn}" opprettet! Kode: ${kode}`);
  };

  // ── Bli med i liste ──
  const bliMed = async (kode) => {
    const {data:liste,error}=await sb.from("lister").select("*").eq("kode",kode).single();
    if(error||!liste){ visToast("Fant ingen liste med den koden","feil"); return; }
    const {error:e2}=await sb.from("liste_medlemmer").upsert({liste_id:liste.id,bruker_id:bruker.id},{onConflict:"liste_id,bruker_id"});
    if(e2){ visToast("Feil ved innmelding","feil"); return; }
    await lastLister();
    setAktivListe(liste);
    visToast(`Du ble med i "${liste.navn}"! 🎉`);
  };

  // ── Varer ──
  const leggTilVare = async () => {
    const navn=nyVare.trim(); if(!navn||!aktivListe) return;
    const tmpId=lagId();
    // Oppdater lokalt med én gang
    setVarer(prev=>[...prev,{id:tmpId,liste_id:aktivListe.id,navn,ferdig:false,type:"manuell",lagt_til_av:bruker.email}]);
    setNyVare("");
    const {data,error}=await sb.from("varer").insert({liste_id:aktivListe.id,navn,ferdig:false,type:"manuell",lagt_til_av:bruker.email}).select().single();
    if(error){ visToast("Feil ved lagring","feil"); setVarer(prev=>prev.filter(v=>v.id!==tmpId)); }
    else { setVarer(prev=>prev.map(v=>v.id===tmpId?data:v)); visToast("Lagt til ✓"); }
  };

  const toggleVare = async (vare) => {
    // Oppdater lokalt med én gang
    setVarer(prev=>prev.map(v=>v.id===vare.id?{...v,ferdig:!v.ferdig}:v));
    await sb.from("varer").update({ferdig:!vare.ferdig}).eq("id",vare.id);
  };

  const fjernFerdige = async () => {
    const ferdigeIds=varer.filter(v=>v.ferdig).map(v=>v.id);
    if(ferdigeIds.length===0) return;
    // Oppdater lokalt med én gang
    setVarer(prev=>prev.filter(v=>!ferdigeIds.includes(v.id)));
    await sb.from("varer").delete().in("id",ferdigeIds);
    visToast("Ferdige varer fjernet");
  };

  const tømHandleliste = async () => {
    // Oppdater lokalt med én gang
    setVarer([]);
    setBekreftTøm(false);
    visToast("Handlelisten er tømt");
    await sb.from("varer").delete().eq("liste_id",aktivListe.id);
  };

  // ── Ukeplan ──
  const leggTilMatrett = async (dag, matrett) => {
    // Oppdater lokalt med én gang
    setUkeplan(prev=>({...prev,[dag]:matrett}));
    setVelgRettForDag(null); setVelgDagForRett(null);
    visToast(`${matrett.navn} lagt til ${dag} ✓`);
    await sb.from("ukeplan").upsert({liste_id:aktivListe.id,dag,matrett:JSON.stringify(matrett)},{onConflict:"liste_id,dag"});
    // Legg ingredienser til handleliste
    for(const ing of matrett.ingredienser){
      const finnes=varer.find(v=>v.navn.toLowerCase()===ing.navn.toLowerCase());
      if(!finnes){
        const tmpId=lagId();
        setVarer(prev=>[...prev,{id:tmpId,liste_id:aktivListe.id,navn:`${ing.navn} (${ing.mengde})`,ferdig:false,type:"auto",kilde:matrett.navn}]);
        const {data}=await sb.from("varer").insert({liste_id:aktivListe.id,navn:`${ing.navn} (${ing.mengde})`,ferdig:false,type:"auto",kilde:matrett.navn,lagt_til_av:bruker.email}).select().single();
        if(data) setVarer(prev=>prev.map(v=>v.id===tmpId?data:v));
      }
    }
  };

  const fjernFraDag = async (dag) => {
    // Oppdater lokalt med én gang
    setUkeplan(prev=>{ const n={...prev}; delete n[dag]; return n; });
    await sb.from("ukeplan").delete().eq("liste_id",aktivListe.id).eq("dag",dag);
  };

  // ── Egne retter ──
  const lagreEgenRett = async (rett) => {
    const {id,...data}=rett;
    const tmpRett={...rett,erEgen:true};
    setEgneRetter(prev=>[...prev,tmpRett]);
    setVisNyRett(false);
    visToast(`${rett.navn} lagret! ✓`);
    const {data:lagret}=await sb.from("egne_retter").insert({liste_id:aktivListe.id,data:JSON.stringify(data)}).select().single();
    if(lagret) setEgneRetter(prev=>prev.map(r=>r.id===rett.id?{...JSON.parse(lagret.data),id:lagret.id,erEgen:true}:r));
  };

  const fjernEgenRett = async (id) => {
    setEgneRetter(prev=>prev.filter(r=>r.id!==id));
    await sb.from("egne_retter").delete().eq("id",id);
  };

  // ── Beregninger ──
  const antallFerdig=varer.filter(v=>v.ferdig).length;
  const antallTotalt=varer.length;
  const antallPlanlagte=Object.keys(ukeplan).length;
  const filtrertMatretter=[...MATRETTER,...egneRetter].filter(m=>{
    if(retterFane==="mine") return m.erEgen;
    return !m.erEgen&&(valgtKategori==="alle"||m.kategori===valgtKategori)&&m.navn.toLowerCase().includes(søk.toLowerCase());
  });

  // ── Loading / Auth ──
  if(lastenBruker) return <div style={{minHeight:"100vh",background:farger.bakgrunn,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontFamily:"sans-serif",color:farger.tekstSvak,fontSize:16}}>Laster...</span></div>;
  if(!bruker) return <AuthScreen farger={farger} onAuth={setBruker}/>;

  const toastFarger={success:farger.toastOk,feil:farger.toastFeil,info:farger.toastInfo};

  return (
    <div style={{minHeight:"100vh",background:farger.bakgrunn,fontFamily:"Georgia,serif",position:"relative"}}>
      <div style={{position:"fixed",inset:0,backgroundImage:farger.overlay,pointerEvents:"none",zIndex:0}}/>

      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toastFarger[toast.type]||farger.toastOk,color:"white",padding:"12px 24px",borderRadius:50,fontFamily:"sans-serif",fontSize:14,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>{toast.melding}</div>}
      {bekreftTøm&&<BekreftModal melding="Er du sikker på at du vil tømme handlelisten?" onJa={tømHandleliste} onNei={()=>setBekreftTøm(false)} farger={farger}/>}
      {velgRettForDag&&<VelgRettModal dag={velgRettForDag} ukeplan={ukeplan} egneRetter={egneRetter} onVelg={leggTilMatrett} onLukk={()=>setVelgRettForDag(null)} farger={farger}/>}
      {velgDagForRett&&<VelgDagModal matrett={velgDagForRett} ukeplan={ukeplan} onVelg={leggTilMatrett} onLukk={()=>setVelgDagForRett(null)} farger={farger}/>}
      {visNyRett&&<NyRettModal onLagre={lagreEgenRett} onLukk={()=>setVisNyRett(false)} farger={farger}/>}
      {visListeVelger&&<ListeVelger lister={lister} aktivListeId={aktivListe?.id} onVelg={setAktivListe} onNy={opprettListe} onBliMedm={bliMed} farger={farger} onLukk={()=>setVisListeVelger(false)}/>}

      <div style={{position:"relative",zIndex:1,maxWidth:520,margin:"0 auto",paddingBottom:100}}>

        {/* HEADER */}
        <div style={{padding:"24px 16px 12px",textAlign:"center",position:"relative"}}>
          <button onClick={()=>setTema(t=>t==="lys"?"mørk":"lys")} style={{position:"absolute",top:24,right:16,width:40,height:40,borderRadius:12,border:`1px solid ${farger.kant}`,background:farger.panel,cursor:"pointer",fontSize:18,boxShadow:farger.skygge}}>
            {tema==="mørk"?"☀️":"🌙"}
          </button>
          <button onClick={()=>{ sb.auth.signOut(); }} style={{position:"absolute",top:24,left:16,width:40,height:40,borderRadius:12,border:`1px solid ${farger.kant}`,background:farger.panel,cursor:"pointer",fontSize:16,boxShadow:farger.skygge}} title="Logg ut">👤</button>
          <img src={LOGO_DATA_URI} alt="Kurven" style={{width:220,height:220,objectFit:"contain",marginBottom:0}}/>
        </div>

        {/* LISTE-VELGER KNAPP */}
        {aktivListe&&(
          <div style={{margin:"0 16px 14px"}}>
            <button onClick={()=>setVisListeVelger(true)} style={{width:"100%",padding:"13px 18px",borderRadius:16,border:`1px solid ${farger.kant}`,background:farger.panel,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:farger.skygge}}>
              <div style={{textAlign:"left"}}>
                <p style={{margin:0,fontFamily:"sans-serif",fontSize:11,fontWeight:700,color:farger.aksent,textTransform:"uppercase",letterSpacing:0.8}}>Aktiv liste</p>
                <p style={{margin:"2px 0 0",fontFamily:"sans-serif",fontSize:16,fontWeight:700,color:farger.tekst}}>{aktivListe.er_egen?"🏠":"👨‍👩‍👧"} {aktivListe.navn}</p>
                {!aktivListe.er_egen&&<p style={{margin:"1px 0 0",fontFamily:"sans-serif",fontSize:12,color:farger.tekstSvak}}>Kode: <b>{aktivListe.kode}</b> — del med familien!</p>}
              </div>
              <span style={{color:farger.aksent,fontSize:18}}>⌄</span>
            </button>
          </div>
        )}

        {/* STAT CARDS */}
        <div style={{display:"flex",gap:12,padding:"0 16px",marginBottom:16}}>
          <div style={{flex:1,background:farger.panel,borderRadius:20,padding:"18px 20px",boxShadow:farger.skygge,border:`1px solid ${farger.kant}`}}>
            <div style={{fontFamily:"sans-serif",fontSize:11,fontWeight:700,color:farger.tekstSekundær,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Denne uka</div>
            <div style={{fontFamily:"sans-serif",fontSize:34,fontWeight:900,color:farger.aksent,lineHeight:1}}>{antallPlanlagte} <span style={{fontSize:18,fontWeight:500,color:farger.tekstSvak}}>av 7</span></div>
            <div style={{fontFamily:"sans-serif",fontSize:13,color:farger.tekstSvak,marginTop:5}}>dager planlagt</div>
          </div>
          <div style={{flex:1,background:farger.panel,borderRadius:20,padding:"18px 20px",boxShadow:farger.skygge,border:`1px solid ${farger.kant}`}}>
            <div style={{fontFamily:"sans-serif",fontSize:11,fontWeight:700,color:farger.tekstSekundær,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Handleliste</div>
            <div style={{fontFamily:"sans-serif",fontSize:34,fontWeight:900,color:farger.aksent,lineHeight:1}}>{antallTotalt}</div>
            <div style={{fontFamily:"sans-serif",fontSize:13,color:farger.tekstSvak,marginTop:5}}>{antallFerdig} av {antallTotalt} ferdig</div>
          </div>
        </div>

        {/* FANER */}
        <div style={{display:"flex",margin:"0 16px 20px",background:farger.panel,borderRadius:18,padding:4,boxShadow:farger.skygge,border:`1px solid ${farger.kant}`}}>
          {[{id:"handleliste",label:"🛒 Handleliste"},{id:"ukeplan",label:"📅 Ukeplan"},{id:"retter",label:"🍽️ Retter"}].map(f=>(
            <button key={f.id} onClick={()=>setAktivFane(f.id)} style={{flex:1,padding:"11px 4px",border:"none",borderRadius:14,cursor:"pointer",fontFamily:"sans-serif",fontSize:13,fontWeight:700,background:aktivFane===f.id?farger.aksentGradient:"transparent",color:aktivFane===f.id?"white":farger.tekstSekundær,transition:"all 0.2s"}}>
              {f.label}
            </button>
          ))}
        </div>

        {/* ── HANDLELISTE ── */}
        {aktivFane==="handleliste"&&(
          <div style={{padding:"0 16px"}}>
            {antallTotalt>0&&(
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontFamily:"sans-serif",fontSize:13,color:farger.tekstSvak,marginBottom:6}}>
                  <span>{antallFerdig} av {antallTotalt} hentet</span>
                  <span>{Math.round((antallFerdig/Math.max(antallTotalt,1))*100)}%</span>
                </div>
                <div style={{height:7,background:farger.progressBakgrunn,borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(antallFerdig/Math.max(antallTotalt,1))*100}%`,background:farger.aksentGradient,borderRadius:4,transition:"width 0.4s"}}/>
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <input value={nyVare} onChange={e=>setNyVare(e.target.value)} onKeyDown={e=>e.key==="Enter"&&leggTilVare()} placeholder="Hva trenger du?" style={{flex:1,padding:"15px 18px",borderRadius:16,border:`1px solid ${farger.inputkant}`,fontSize:16,fontFamily:"sans-serif",background:farger.panel,color:farger.tekst,outline:"none",boxShadow:farger.skygge}}/>
              <button onClick={leggTilVare} style={{padding:"15px 20px",borderRadius:16,border:"none",background:farger.aksentGradient,color:"white",fontSize:22,cursor:"pointer",boxShadow:"0 2px 8px rgba(232,93,47,0.3)"}}>+</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {antallFerdig>0&&<button onClick={fjernFerdige} style={{flex:1,padding:"10px",borderRadius:12,border:`1px solid ${farger.kant}`,background:"transparent",color:farger.tekstSekundær,fontFamily:"sans-serif",fontSize:13,fontWeight:600,cursor:"pointer"}}>Fjern ferdige</button>}
              {antallTotalt>0&&<button onClick={()=>setBekreftTøm(true)} style={{padding:"10px 14px",borderRadius:12,border:`1px solid ${farger.kant}`,background:"transparent",color:farger.aksent,fontFamily:"sans-serif",fontSize:13,fontWeight:600,cursor:"pointer"}}>🗑️ Tøm</button>}
            </div>
            {varer.length===0?(
              <div style={{textAlign:"center",padding:"48px 20px",color:farger.tekstSvak,fontFamily:"sans-serif"}}>
                <div style={{fontSize:56,marginBottom:14}}>🛒</div>
                <p style={{margin:0,fontSize:17,fontWeight:600,color:farger.tekst}}>Kurven er tom</p>
                <p style={{margin:"6px 0 0",fontSize:14}}>Legg til varer eller planlegg en middag</p>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {varer.map(vare=>(
                  <div key={vare.id} onClick={()=>toggleVare(vare)} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",background:vare.ferdig?"rgba(255,255,255,0.4)":farger.panel,borderRadius:16,cursor:"pointer",border:`1px solid ${farger.kant}`,opacity:vare.ferdig?0.6:1,boxShadow:farger.skygge,transition:"all 0.2s"}}>
                    <div style={{width:26,height:26,borderRadius:8,border:vare.ferdig?"none":`2px solid ${farger.aksent}`,background:vare.ferdig?farger.aksentGradient:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {vare.ferdig&&<span style={{color:"white",fontSize:14,fontWeight:700}}>✓</span>}
                    </div>
                    <div style={{flex:1}}>
                      <span style={{fontFamily:"sans-serif",fontSize:16,color:vare.ferdig?farger.tekstSvak:farger.tekst,textDecoration:vare.ferdig?"line-through":"none"}}>{vare.navn}</span>
                    </div>
                    {vare.type==="auto"&&vare.kilde&&<span style={{fontFamily:"sans-serif",fontSize:11,color:farger.aksent,background:farger.aksentSvak,padding:"3px 8px",borderRadius:20,whiteSpace:"nowrap"}}>{vare.kilde}</span>}
                    {vare.lagt_til_av&&vare.lagt_til_av!==bruker.email&&<span style={{fontFamily:"sans-serif",fontSize:11,color:farger.tekstSvak}}>👤</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── UKEPLAN ── */}
        {aktivFane==="ukeplan"&&(
          <div style={{padding:"0 16px"}}>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {DAGER.map(dag=>{
                const m=ukeplan[dag];
                return (
                  <div key={dag} style={{background:farger.panel,borderRadius:18,border:`1px solid ${m?farger.aksent+"33":farger.kant}`,padding:"16px 18px",boxShadow:farger.skygge}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{flex:1}}>
                        <p style={{margin:0,fontFamily:"sans-serif",fontWeight:700,fontSize:12,color:farger.aksent,textTransform:"uppercase",letterSpacing:0.8}}>{dag}</p>
                        {m?(
                          <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6}}>
                            {m.bilde&&<img src={m.bilde} alt={m.navn} style={{width:44,height:44,borderRadius:10,objectFit:"cover"}}/>}
                            <div>
                              <p style={{margin:0,fontFamily:"sans-serif",fontSize:16,fontWeight:700,color:farger.tekst}}>{m.emoji} {m.navn}</p>
                              <p style={{margin:"2px 0 0",fontFamily:"sans-serif",fontSize:12,color:farger.tekstSvak}}>⏱ {m.tid}</p>
                            </div>
                          </div>
                        ):(
                          <p style={{margin:"4px 0 0",fontFamily:"sans-serif",fontSize:14,color:farger.tekstSvak}}>Ingen middag planlagt</p>
                        )}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        {m&&<button onClick={()=>fjernFraDag(dag)} style={{width:34,height:34,borderRadius:10,border:"none",background:farger.aksentSvak,color:farger.aksent,cursor:"pointer",fontSize:16}}>✕</button>}
                        <button onClick={()=>setVelgRettForDag(dag)} style={{padding:"8px 16px",borderRadius:12,border:"none",background:farger.aksentGradient,color:"white",fontFamily:"sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                          {m?"Bytt":"Velg"}
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── RETTER ── */}
        {aktivFane==="retter"&&(
          <div style={{padding:"0 16px"}}>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {[{id:"foreslåtte",label:"⭐ Foreslåtte"},{id:"mine",label:"👨‍🍳 Mine retter"}].map(f=>(
                <button key={f.id} onClick={()=>setRetterFane(f.id)} style={{flex:1,padding:"11px",borderRadius:14,border:"none",background:retterFane===f.id?farger.aksentGradient:farger.panel,color:retterFane===f.id?"white":farger.tekstSekundær,fontFamily:"sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:retterFane===f.id?"0 2px 8px rgba(232,93,47,0.3)":farger.skygge,border:`1px solid ${farger.kant}`}}>
                  {f.label}
                </button>
              ))}
            </div>
            {retterFane==="foreslåtte"&&(
              <>
                <input value={søk} onChange={e=>setSøk(e.target.value)} placeholder="Søk etter rett..." style={{width:"100%",padding:"13px 16px",borderRadius:14,border:`1px solid ${farger.inputkant}`,fontSize:15,fontFamily:"sans-serif",background:farger.panel,color:farger.tekst,outline:"none",boxSizing:"border-box",marginBottom:12}}/>
                <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12}}>
                  {KATEGORIER.map(k=>(
                    <button key={k.id} onClick={()=>setValgtKategori(k.id)} style={{padding:"7px 14px",borderRadius:20,background:valgtKategori===k.id?farger.aksentGradient:farger.panel,color:valgtKategori===k.id?"white":farger.tekstSekundær,border:valgtKategori===k.id?"none":`1px solid ${farger.kant}`,fontFamily:"sans-serif",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
                      {k.label}
                    </button>
                  ))}
                </div>
              </>
            )}
            {retterFane==="mine"&&(
              <button onClick={()=>setVisNyRett(true)} style={{width:"100%",padding:"14px",borderRadius:16,border:`2px dashed ${farger.aksent}`,background:"transparent",color:farger.aksent,fontFamily:"sans-serif",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:14}}>
                + Legg til ny rett
              </button>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {filtrertMatretter.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:farger.tekstSvak,fontFamily:"sans-serif"}}>{retterFane==="mine"?"Ingen egne retter ennå.":"Ingen retter funnet."}</div>}
              {filtrertMatretter.map(r=>(
                <div key={r.id} style={{background:farger.panel,borderRadius:18,overflow:"hidden",boxShadow:farger.skygge,border:`1px solid ${farger.kant}`}}>
                  {r.bilde&&<img src={r.bilde} alt={r.navn} style={{width:"100%",height:160,objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>}
                  <div style={{padding:16}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                      <div>
                        <p style={{margin:0,fontFamily:"sans-serif",fontSize:18,fontWeight:800,color:farger.tekst}}>{r.emoji} {r.navn}</p>
                        <p style={{margin:"3px 0 0",fontFamily:"sans-serif",fontSize:13,color:farger.tekstSvak}}>⏱ {r.tid}</p>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        {r.erEgen&&<button onClick={()=>fjernEgenRett(r.id)} style={{padding:"8px 12px",borderRadius:10,border:"none",background:farger.aksentSvak,color:farger.aksent,cursor:"pointer"}}>🗑️</button>}
                        <button onClick={()=>setVelgDagForRett(r)} style={{padding:"8px 16px",borderRadius:10,border:"none",background:farger.aksentGradient,color:"white",fontFamily:"sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Legg til</button>
                      </div>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {r.ingredienser.map((ing,i)=>(
                        <span key={i} style={{padding:"4px 10px",borderRadius:20,background:farger.aksentSvak,color:farger.aksent,fontFamily:"sans-serif",fontSize:12}}>{ing.navn}</span>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      <style>{`*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}input:focus{border-color:${farger.aksent}!important;}input::placeholder{color:#aaa;}::-webkit-scrollbar{display:none;}`}</style>
    </div>
  );
}

root.render(<App />);
